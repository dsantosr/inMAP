name: Deploy to GitHub Pages

on:
  # Dispara a action toda vez que houver um push na branch "main"
  push:
    branches: ["main"]
  # Permite rodamento manual da Action no portal web
  workflow_dispatch:

# Dá as permissões necessárias de leitura/escrita relativas e de token
permissions:
  contents: read
  pages: write
  id-token: write

# Previne que múltiplos deploys rodem ao mesmo tempo (caso faça pushes seguidos rápidos)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Job responsável apenas por construir o projeto
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # Job responsável por pegar o projeto construído e postar na web
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
